<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SignBridge</title>
    <style>
        /* ══════════════════════════════════════════
           BASE
           ══════════════════════════════════════════ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #0d0d1a;
            border-bottom: 1px solid #1e1e3a;
        }

        .app-logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #6c63ff;
            letter-spacing: 0.5px;
        }

        .app-logo span { color: #4caf80; }


        /* ══════════════════════════════════════════
           LAYOUT
           ══════════════════════════════════════════ */

        /* ══════════════════════════════════════════
           PHASE 1: CONVERSATION
           ══════════════════════════════════════════ */
        .conversation-layout {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 56px);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Camera side */
        .camera-side {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .camera-box {
            flex: 1;
            background: #111122;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #1e1e3a;
        }

        .camera-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: #13132a;
            border-bottom: 1px solid #1e1e3a;
        }

        .camera-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b07cf0;
        }

        .rec-badge {
            display: none;
            padding: 2px 10px;
            border-radius: 10px;
            background: #ff4444;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            animation: pulse 1s infinite;
        }
        .rec-badge.on { display: inline-block; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .camera-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #0a0a14;
            min-height: 280px;
        }

        .camera-view video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-placeholder {
            color: #444;
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }

        .rec-border {
            display: none;
            position: absolute;
            inset: 0;
            border: 3px solid #ff4444;
            pointer-events: none;
            z-index: 5;
        }
        .rec-border.on { display: block; }

        /* Status bar under camera */
        .status-bar {
            padding: 12px 16px;
            min-height: 50px;
            background: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.95rem;
            border-top: 1px solid #1e1e3a;
        }

        .status-bar .gloss { color: #6c8cff; font-family: monospace; font-weight: 600; letter-spacing: 1px; }
        .status-bar .sentence { color: #4caf80; font-weight: 500; }
        .status-bar .prompt { color: #666; font-style: italic; }
        .status-bar .processing { color: #f0a050; animation: pulse 1s infinite; }
        .status-bar .doctor-script {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .status-bar .script-label {
            color: #7cb3f0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-bar .script-line {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .status-bar .script-hint {
            color: #555;
            font-size: 0.75rem;
        }
        .status-bar .listening-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        /* Controls under camera */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
        }

        .btn {
            padding: 10px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: #4a6cf7; color: #fff; }
        .btn-primary:hover { background: #3a5ce5; }
        .btn-primary:disabled { background: #333; opacity: 0.5; cursor: not-allowed; }

        .btn-secondary { background: #1e1e3a; color: #aaa; }
        .btn-secondary:hover { background: #2a2a50; color: #fff; }


        /* Transcript side */
        .transcript-side {
            flex: 1;
            background: #111122;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            min-width: 280px;
            max-width: 360px;
            border: 1px solid #1e1e3a;
        }

        .transcript-title {
            padding: 14px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #888;
            border-bottom: 1px solid #1e1e3a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .transcript-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.88rem;
            line-height: 1.5;
            max-width: 90%;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

        .msg.doctor { background: #1a2e4a; color: #c0d8f0; align-self: flex-start; border-bottom-left-radius: 3px; }
        .msg.patient { background: #2e1a4a; color: #d0c0f0; align-self: flex-end; border-bottom-right-radius: 3px; }

        .msg .speaker {
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .msg.doctor .speaker { color: #7cb3f0; }
        .msg.patient .speaker { color: #b07cf0; }

        /* ══════════════════════════════════════════
           MOBILE
           ══════════════════════════════════════════ */
        @media (max-width: 768px) {
            .conversation-layout {
                flex-direction: column;
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            .camera-side { flex: none; }
            .camera-view { min-height: 200px; }
            .transcript-side {
                flex: none;
                min-width: unset;
                max-width: 100%;
                max-height: 220px;
            }
            .transcript-msgs { padding: 10px; gap: 6px; }
            .msg { font-size: 0.82rem; padding: 8px 10px; }
            .controls-row { padding: 6px 10px; }
            .btn { padding: 8px 18px; font-size: 0.82rem; }

        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="app-logo">Sign<span>Bridge</span></div>
</header>

<!-- ══════════════════════════════════════════
     PHASE 1: CONVERSATION
     ══════════════════════════════════════════ -->
<div class="conversation-layout" id="phaseConvo">
    <div class="camera-side">
        <div class="camera-box">
            <div class="camera-topbar">
                <span class="camera-title">Live Camera</span>
                <span class="rec-badge" id="recBadge">● REC</span>
            </div>
            <div class="camera-view" id="cameraView">
                <div class="camera-placeholder" id="cameraPlaceholder" style="color:#222">Camera will start when you begin</div>
                <video id="cameraFeed" autoplay muted playsinline webkit-playsinline style="display:none"></video>
                <div class="rec-border" id="recBorder"></div>
            </div>
            <div class="status-bar" id="statusBar">
                <span class="prompt">Press "Start" to begin the conversation</span>
            </div>
        </div>

        <div class="controls-row">
            <button class="btn btn-primary" id="btnStart">Start Conversation</button>
            <button class="btn btn-secondary" id="btnRestart" style="display:none">Restart</button>
        </div>
    </div>

    <div class="transcript-side">
        <div class="transcript-title">Live Transcript</div>
        <div class="transcript-msgs" id="transcriptMsgs"></div>
    </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let conversation = null;
let currentTurn = 0;
let isPlaying = false;
let history = []; // conversation history for LLM context
let cameraStream = null;

// DOM
const btnStart = document.getElementById('btnStart');
const btnRestart = document.getElementById('btnRestart');
const transcriptMsgs = document.getElementById('transcriptMsgs');
const cameraFeed = document.getElementById('cameraFeed');
const cameraPlaceholder = document.getElementById('cameraPlaceholder');
const statusBar = document.getElementById('statusBar');
const recBadge = document.getElementById('recBadge');
const recBorder = document.getElementById('recBorder');
const cameraView = document.getElementById('cameraView');

// Sign video overlay element
const signVid = document.createElement('video');
signVid.muted = true;
signVid.playsInline = true;
signVid.setAttribute('webkit-playsinline', '');
signVid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:4;background:#0a0a14;display:none;';
cameraView.appendChild(signVid);

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Validate LLM sentence — reject if it goes off-script
function isLLMSentenceValid(llmSentence, glosses, hardcoded) {
    if (!llmSentence || llmSentence.length === 0 || llmSentence.length > 150) return false;

    const lower = llmSentence.toLowerCase();

    // Must contain at least half the glosses (as words or roots)
    const glossRoots = {
        'meet': ['meet', 'meeting'],
        'doctor': ['doctor', 'dr'],
        'son': ['son'],
        'bed': ['bed'],
        'time': ['time'],
        'work': ['work', 'works', 'working'],
        'full': ['full'],
        'enjoy': ['enjoy', 'enjoys', 'enjoyed'],
        'go': ['go', 'goes', 'going'],
        'cook': ['cook', 'cooking', 'cooks'],
        'chair': ['chair', 'sit', 'sits', 'seat'],
        'tall': ['tall'],
        'finish': ['finish', 'finished', 'done'],
        'what': ['what'],
        'black': ['black']
    };

    let matched = 0;
    for (const g of glosses) {
        const variants = glossRoots[g] || [g];
        if (variants.some(v => lower.includes(v))) matched++;
    }

    // At least half the glosses must appear
    if (matched < Math.ceil(glosses.length / 2)) return false;

    // Reject if it's way too different from hardcoded (completely wrong topic)
    // Extract key nouns from hardcoded and check at least one appears
    const hardcodedWords = hardcoded.toLowerCase().split(/\s+/);
    const keyWords = hardcodedWords.filter(w => w.length > 3 && !['that', 'this', 'have', 'been', 'with', 'from', 'here', 'will', 'does', 'them', 'their', 'your', 'it\'s', 'he\'s'].includes(w));
    if (keyWords.length > 0) {
        const keyMatched = keyWords.some(w => lower.includes(w));
        if (!keyMatched) return false;
    }

    // Reject if it asks a question when hardcoded doesn't, or vice versa
    const llmIsQuestion = llmSentence.includes('?');
    const hardcodedIsQuestion = hardcoded.includes('?');
    if (llmIsQuestion !== hardcodedIsQuestion) return false;

    return true;
}

// ══════════════════════════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════════════════════════
async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        });
        cameraFeed.srcObject = cameraStream;
        cameraFeed.style.display = 'block';
        cameraPlaceholder.style.display = 'none';
    } catch (e) {
        cameraPlaceholder.style.display = 'none';
    }
}

function stopCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
    }
}

// ══════════════════════════════════════════════════════════════
// TEXT-TO-SPEECH (for patient sentences)
// ══════════════════════════════════════════════════════════════
function speak(text) {
    return new Promise(resolve => {
        if (!('speechSynthesis' in window)) { resolve(); return; }
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9;
        u.pitch = 1.0;
        const timeout = setTimeout(() => { speechSynthesis.cancel(); resolve(); },
            Math.max(text.split(' ').length * 500, 2500) + 3000);
        u.onend = () => { clearTimeout(timeout); resolve(); };
        u.onerror = () => { clearTimeout(timeout); resolve(); };
        speechSynthesis.speak(u);
    });
}

// ══════════════════════════════════════════════════════════════
// SPEECH RECOGNITION (for doctor's spoken lines)
// ══════════════════════════════════════════════════════════════
function listenForSpeech(expectedText) {
    return new Promise(resolve => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            // Fallback: wait for tap/click (no error message — just clean prompt)
            const hint = statusBar.querySelector('.script-hint');
            if (hint) hint.textContent = 'Tap here when done speaking';
            function onClick() {
                statusBar.removeEventListener('click', onClick);
                resolve(expectedText);
            }
            statusBar.addEventListener('click', onClick);
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        let finalResult = '';
        let resolved = false;

        // Safety timeout
        const timeout = setTimeout(() => {
            if (!resolved) {
                resolved = true;
                recognition.stop();
                resolve(finalResult || expectedText);
            }
        }, 15000);

        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalResult += transcript;
                } else {
                    interim = transcript;
                }
            }
            // Show live speech feedback
            const display = finalResult || interim;
            if (display) {
                const hint = statusBar.querySelector('.script-hint');
                if (hint) hint.innerHTML = '<span class="listening-indicator"></span>Hearing: "' + display + '"';
            }
        };

        recognition.onend = () => {
            if (!resolved) {
                resolved = true;
                clearTimeout(timeout);
                resolve(finalResult || expectedText);
            }
        };

        recognition.onerror = () => {
            if (!resolved) {
                resolved = true;
                clearTimeout(timeout);
                resolve(expectedText);
            }
        };

        recognition.start();
    });
}

// ══════════════════════════════════════════════════════════════
// SIGN VIDEO PLAYBACK
// ══════════════════════════════════════════════════════════════
function playSignVideo(url) {
    return new Promise(resolve => {
        let done = false;
        function finish(r) {
            if (done) return;
            done = true;
            signVid.onended = null;
            signVid.onerror = null;
            signVid.onloadeddata = null;
            clearTimeout(to);
            resolve(r);
        }

        signVid.pause();
        signVid.onended = null;
        signVid.onerror = null;
        signVid.onloadeddata = null;

        const to = setTimeout(() => finish(false), 5000);

        signVid.onerror = () => finish(false);
        signVid.onloadeddata = () => {
            signVid.onloadeddata = null;
            signVid.onended = () => finish(true);
            signVid.play().catch(() => finish(false));
        };

        signVid.style.display = 'block';
        signVid.src = url;
        signVid.load();
    });
}

// ══════════════════════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════════════════════
async function loadConversation() {
    const resp = await fetch('/api/conversation');
    conversation = await resp.json();
    btnStart.disabled = false;
}
loadConversation();

// ══════════════════════════════════════════════════════════════
// CONVERSATION FLOW
// ══════════════════════════════════════════════════════════════
btnStart.addEventListener('click', async () => {
    if (!conversation) return;
    btnStart.disabled = true;
    btnRestart.style.display = 'inline-block';
    currentTurn = 0;
    isPlaying = true;
    history = [];

    // Warm up TTS on user gesture so mobile browsers allow it later
    if ('speechSynthesis' in window) {
        const warmup = new SpeechSynthesisUtterance('');
        warmup.volume = 0;
        speechSynthesis.speak(warmup);
    }

    await startCamera();
    playNextTurn();
});

btnRestart.addEventListener('click', () => {
    currentTurn = 0;
    history = [];
    isPlaying = false;
    transcriptMsgs.innerHTML = '';
    btnStart.disabled = false;
    btnRestart.style.display = 'none';
    recBadge.classList.remove('on');
    recBorder.classList.remove('on');
    signVid.style.display = 'none';
    statusBar.innerHTML = '<span class="prompt">Press "Start" to begin the conversation</span>';
    stopCamera();
    cameraFeed.style.display = 'none';
    cameraPlaceholder.style.display = '';
    cameraPlaceholder.textContent = 'Camera will start when you begin';
});

async function playNextTurn() {
    if (currentTurn >= conversation.turns.length || !isPlaying) {
        statusBar.innerHTML = '<span class="sentence">Conversation complete!</span>';
        stopCamera();
        return;
    }

    const turn = conversation.turns[currentTurn];
    if (turn.speaker === 'doctor') {
        await playDoctorTurn(turn);
    } else {
        await playPatientTurn(turn);
    }

    currentTurn++;
    await sleep(600);
    playNextTurn();
}

// ── Doctor turn: show script, listen for speech, add to transcript ──
async function playDoctorTurn(turn) {
    signVid.style.display = 'none';

    // Show the scripted line as a teleprompter
    const hasSpeechRec = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    const hintText = hasSpeechRec
        ? '<span class="listening-indicator"></span>Listening...'
        : 'Tap here when done speaking';

    statusBar.innerHTML = `
        <div class="doctor-script">
            <div class="script-label">Read this line aloud:</div>
            <div class="script-line">"${turn.text}"</div>
            <div class="script-hint">${hintText}</div>
        </div>`;

    // Start speech recognition
    const recognized = await listenForSpeech(turn.text);

    // Add recognized (or scripted) text to transcript
    const displayText = recognized.trim() || turn.text;
    addMsg('doctor', 'Doctor', displayText);
    // Always use scripted text for LLM context consistency
    history.push({ speaker: 'doctor', text: turn.text });
}

// ── Patient turn: play sign videos → LLM → TTS ──
async function playPatientTurn(turn) {
    const glosses = turn.glosses;
    const signs = turn.sign_videos || glosses;

    recBadge.classList.add('on');
    recBorder.classList.add('on');
    statusBar.innerHTML = '<span class="processing">Patient signing...</span>';

    // Play each sign video
    let accumulated = [];
    for (let i = 0; i < signs.length; i++) {
        accumulated.push(signs[i].toUpperCase());
        statusBar.innerHTML = '<span class="gloss">Detected: ' + accumulated.join(' ') + '</span>';

        const played = await playSignVideo(`/sign-bank/${signs[i]}.mp4`);
        if (!played) await sleep(1200);
        await sleep(250);
    }

    recBadge.classList.remove('on');
    recBorder.classList.remove('on');
    signVid.style.display = 'none';
    await sleep(400);

    // LLM sentence construction
    statusBar.innerHTML = '<span class="processing">SignBridge constructing sentence...</span>';

    let sentence = turn.asl_sentence; // hardcoded fallback
    try {
        const resp = await fetch('/api/construct-sentence', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ glosses, conversation_history: history })
        });
        const result = await resp.json();
        if (result.success && result.sentence) {
            const llmSentence = result.sentence.trim();
            // Validate LLM output before using it
            if (isLLMSentenceValid(llmSentence, glosses, turn.asl_sentence)) {
                sentence = llmSentence;
            } else {
                console.log('LLM rejected, using hardcoded:', llmSentence);
            }
        }
    } catch (e) {
        console.log('LLM fallback:', e);
    }

    // Show sentence
    statusBar.innerHTML = '<span class="sentence">' + sentence + '</span>';
    addMsg('patient', 'Patient (ASL → English)', sentence);
    history.push({ speaker: 'patient', text: sentence });

    // Read aloud
    await speak(sentence);
    await sleep(800);
}

// ══════════════════════════════════════════════════════════════
// TRANSCRIPT
// ══════════════════════════════════════════════════════════════
function addMsg(type, speaker, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    d.innerHTML = `<div class="speaker">${speaker}</div><div>${text}</div>`;
    transcriptMsgs.appendChild(d);
    transcriptMsgs.scrollTop = transcriptMsgs.scrollHeight;
}

</script>
</body>
</html>
